    <style>
        /* BODY */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background-size: cover;
            background-position: center;
            background-image: url(../Img/green_city_p[pbg.jpg);
        }

        /* LOGIN BOX */
        .login-box {
            position: relative;
            width: 350px;
            padding: 40px;
            border-radius: 20px;

            background: rgba(255, 255, 255, 0.12);


            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);

            text-align: center;
        }

        /* TITLE */
        .login-box h2,
        .login-box h3 {
            color: black;
        }

        /* INPUT */
        .input-box {
            margin: 15px 0;
        }

        .input-box input {
            width: 100%;
            padding: 12px;
            border: none;
            outline: none;
            border-radius: 10px;
            font-size: 16px;

            background: rgba(255, 255, 255, 0.8);
        }

        /* LINKS */
        .login-box a {
            text-decoration: none;
        }

        .login-box a:hover {
            color: black;
        }

        /* BUTTON */
        .btn {
            width: 100%;
            padding: 12px;
            margin-top: 20px;

            border: none;
            border-radius: 10px;

            background: white;
            color: black;
            font-size: 16px;
            cursor: pointer;

        }

        .btn:hover {
            background: black;
            color: white;
        }

        /* REGISTER */
        .register {
            margin-top: 20px;
        }

    </style>
